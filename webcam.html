<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webcam Fisika · Stefanus Setiawan</title>
    <!-- Google Fonts & Font Awesome -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at 20% 30%, #0a1628, #0b1a2e, #0f1f33);
            font-family: 'Inter', sans-serif;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animasi partikel latar belakang */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 40% 70%, rgba(255,255,255,0.2), transparent),
                radial-gradient(2px 2px at 60% 20%, rgba(255,255,255,0.3), transparent),
                radial-gradient(2px 2px at 80% 80%, rgba(255,255,255,0.2), transparent),
                radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 90% 10%, rgba(255,255,255,0.4), transparent),
                radial-gradient(1px 1px at 50% 50%, rgba(255,255,255,0.1), transparent);
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
            animation: twinkle 4s ease-in-out infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        /* Orb dekoratif */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
            background: radial-gradient(circle, rgba(31, 109, 169, 0.15), transparent 70%);
            animation: floatOrb 8s ease-in-out infinite alternate;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -50px;
            background: radial-gradient(circle, rgba(100, 180, 255, 0.1), transparent 70%);
            animation: floatOrb 10s ease-in-out infinite alternate-reverse;
        }

        @keyframes floatOrb {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, 30px) scale(1.1); }
        }

        .main-container {
            max-width: 1100px;
            width: 100%;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        /* Header */
        .header-section {
            text-align: center;
            color: white;
            padding: 0.5rem 0;
        }

        .header-section .badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            padding: 0.3rem 1.8rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 0.8rem;
            text-transform: uppercase;
        }

        .header-section h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #7f9fc7 50%, #4a7a9c 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.3rem;
        }

        .header-section .subtitle {
            font-size: 1.1rem;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .header-section .subtitle i {
            margin: 0 8px;
            color: #4a7a9c;
        }

        /* Webcam Card */
        .webcam-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 1.8rem 1.8rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .webcam-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.08);
        }

        .webcam-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
            padding: 0 0.5rem;
            flex-wrap: wrap;
            gap: 10px;
        }

        .webcam-header .left {
            display: flex;
            align-items: center;
            gap: 14px;
            color: rgba(255, 255, 255, 0.8);
        }

        .webcam-header .left .indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }

        .webcam-header .left .indicator .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            transition: all 0.3s;
        }

        .dot.active {
            background: #2ecc71;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.5);
            animation: pulse-dot 1.5s infinite;
        }

        .dot.inactive {
            background: #e74c3c;
            box-shadow: 0 0 20px rgba(231, 76, 60, 0.3);
        }

        .dot.loading {
            background: #f39c12;
            box-shadow: 0 0 20px rgba(243, 156, 18, 0.3);
            animation: pulse-dot 0.8s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }

        .webcam-header .right {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .webcam-header .right .cam-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 14px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Tombol kontrol */
        .btn-cam {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            padding: 8px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .btn-cam:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.02);
        }

        .btn-cam.danger:hover {
            background: rgba(231, 76, 60, 0.3);
            border-color: rgba(231, 76, 60, 0.4);
        }

        .btn-cam.success:hover {
            background: rgba(46, 204, 113, 0.2);
            border-color: rgba(46, 204, 113, 0.3);
        }

        .btn-cam:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Video wrapper */
        .video-wrapper {
            position: relative;
            border-radius: 1.8rem;
            overflow: hidden;
            background: #0a1628;
            aspect-ratio: 16/9;
            min-height: 350px;
            box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.5);
        }

        .video-wrapper::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 1.8rem;
            padding: 2px;
            background: linear-gradient(135deg, rgba(31, 109, 169, 0.3), rgba(127, 159, 199, 0.1), rgba(31, 109, 169, 0.3));
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
            z-index: 2;
        }

        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            position: relative;
            z-index: 1;
            background: #0a1628;
        }

        .video-wrapper .placeholder {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.4);
            z-index: 0;
            gap: 16px;
            background: radial-gradient(circle at center, rgba(10, 22, 40, 0.8), #0a1628);
        }

        .video-wrapper .placeholder i {
            font-size: 4rem;
            opacity: 0.5;
        }

        .video-wrapper .placeholder p {
            font-size: 1rem;
            opacity: 0.6;
            max-width: 300px;
            text-align: center;
        }

        .video-wrapper .overlay-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 30px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.75rem;
            letter-spacing: 1px;
            z-index: 3;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: none;
        }

        .video-wrapper .overlay-text.show {
            display: block;
        }

        /* Physics info bar */
        .physics-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 1.2rem;
            padding: 0 0.5rem;
        }

        .physics-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .physics-item:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }

        .physics-item .icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(31, 109, 169, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #7f9fc7;
            font-size: 1rem;
            flex-shrink: 0;
        }

        .physics-item .info {
            flex: 1;
        }

        .physics-item .info .label {
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.4);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .physics-item .info .value {
            font-size: 0.95rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Footer */
        .footer-section {
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            padding: 0.5rem 0;
            letter-spacing: 0.5px;
        }

        .footer-section i {
            margin: 0 6px;
            color: rgba(255, 255, 255, 0.1);
        }

        .footer-section a {
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            transition: color 0.2s;
        }

        .footer-section a:hover {
            color: rgba(255, 255, 255, 0.6);
        }

        /* Responsif */
        @media (max-width: 768px) {
            .header-section h1 {
                font-size: 2.2rem;
            }
            .header-section .subtitle {
                font-size: 0.95rem;
            }
            .webcam-card {
                padding: 1.2rem;
                border-radius: 2rem;
            }
            .video-wrapper {
                min-height: 250px;
            }
            .physics-bar {
                grid-template-columns: 1fr 1fr;
            }
        }

        @media (max-width: 480px) {
            .header-section h1 {
                font-size: 1.6rem;
            }
            .webcam-header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .webcam-header .right {
                justify-content: flex-start;
            }
            .video-wrapper {
                min-height: 200px;
            }
            .physics-bar {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Orb dekoratif -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>

    <div class="main-container">
        <!-- Header -->
        <div class="header-section">
            <div class="badge">
                <i class="fas fa-atom"></i> LAB FISIKA DIGITAL
            </div>
            <h1>Webcam Studio</h1>
            <div class="subtitle">
                <i class="fas fa-arrow-right"></i>
                Stefanus Setiawan · Guru Fisika
                <i class="fas fa-arrow-left"></i>
            </div>
        </div>

        <!-- Webcam Card -->
        <div class="webcam-card">
            <div class="webcam-header">
                <div class="left">
                    <div class="indicator">
                        <span class="dot inactive" id="statusDot"></span>
                        <span id="statusText">Kamera tidak aktif</span>
                    </div>
                </div>
                <div class="right">
                    <span class="cam-label">
                        <i class="fas fa-camera"></i> Webcam
                    </span>
                    <button class="btn-cam success" id="toggleBtn">
                        <i class="fas fa-play"></i> Mulai
                    </button>
                    <button class="btn-cam" id="screenshotBtn" disabled>
                        <i class="fas fa-camera"></i> SS
                    </button>
                </div>
            </div>

            <div class="video-wrapper" id="videoWrapper">
                <video id="videoElement" autoplay playsinline></video>
                <div class="placeholder" id="placeholder">
                    <i class="fas fa-video-slash"></i>
                    <p>Klik "Mulai" untuk mengaktifkan kamera</p>
                </div>
                <div class="overlay-text" id="overlayText">
                    <i class="fas fa-circle" style="color: #2ecc71; font-size: 0.5rem;"></i> LIVE
                </div>
            </div>

            <!-- Physics Info Bar -->
            <div class="physics-bar">
                <div class="physics-item">
                    <div class="icon"><i class="fas fa-microscope"></i></div>
                    <div class="info">
                        <div class="label">Resolusi</div>
                        <div class="value" id="resolution">-</div>
                    </div>
                </div>
                <div class="physics-item">
                    <div class="icon"><i class="fas fa-sync-alt"></i></div>
                    <div class="info">
                        <div class="label">Frame Rate</div>
                        <div class="value" id="framerate">- FPS</div>
                    </div>
                </div>
                <div class="physics-item">
                    <div class="icon"><i class="fas fa-thermometer-half"></i></div>
                    <div class="info">
                        <div class="label">Status</div>
                        <div class="value" id="statusValue">Tidak Aktif</div>
                    </div>
                </div>
                <div class="physics-item">
                    <div class="icon"><i class="fas fa-camera-retro"></i></div>
                    <div class="info">
                        <div class="label">Perangkat</div>
                        <div class="value" id="deviceName">-</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-section">
            <i class="fas fa-atom"></i>
            <span>© 2026 · Stefanus Setiawan · Fisika Santa Laurensia</span>
            <i class="fas fa-atom"></i>
        </div>
    </div>

    <script>
        (function() {
            'use strict';
            
            const video = document.getElementById('videoElement');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const placeholder = document.getElementById('placeholder');
            const overlayText = document.getElementById('overlayText');
            const toggleBtn = document.getElementById('toggleBtn');
            const screenshotBtn = document.getElementById('screenshotBtn');
            const resolutionEl = document.getElementById('resolution');
            const framerateEl = document.getElementById('framerate');
            const statusValueEl = document.getElementById('statusValue');
            const deviceNameEl = document.getElementById('deviceName');

            let stream = null;
            let isActive = false;
            let videoTrack = null;

            // --- Update Status UI ---
            function setStatus(state, message) {
                statusDot.className = 'dot';
                if (state === 'active') {
                    statusDot.classList.add('active');
                    statusText.textContent = message || 'Kamera aktif';
                    statusValueEl.textContent = '● Aktif';
                    statusValueEl.style.color = '#2ecc71';
                    overlayText.classList.add('show');
                    placeholder.style.display = 'none';
                    screenshotBtn.disabled = false;
                    toggleBtn.innerHTML = '<i class="fas fa-stop"></i> Hentikan';
                    toggleBtn.className = 'btn-cam danger';
                } else if (state === 'loading') {
                    statusDot.classList.add('loading');
                    statusText.textContent = message || 'Memulai kamera...';
                    statusValueEl.textContent = '⏳ Memuat...';
                    statusValueEl.style.color = '#f39c12';
                    overlayText.classList.remove('show');
                    screenshotBtn.disabled = true;
                } else {
                    statusDot.classList.add('inactive');
                    statusText.textContent = message || 'Kamera tidak aktif';
                    statusValueEl.textContent = '● Tidak Aktif';
                    statusValueEl.style.color = '#e74c3c';
                    overlayText.classList.remove('show');
                    placeholder.style.display = 'flex';
                    screenshotBtn.disabled = true;
                    toggleBtn.innerHTML = '<i class="fas fa-play"></i> Mulai';
                    toggleBtn.className = 'btn-cam success';
                }
            }

            // --- Start Camera ---
            async function startCamera() {
                try {
                    setStatus('loading', 'Mengakses kamera...');

                    const constraints = {
                        video: {
                            facingMode: 'user',
                            width: { ideal: 1280 },
                            height: { ideal: 720 },
                            frameRate: { ideal: 30 }
                        },
                        audio: false
                    };

                    stream = await navigator.mediaDevices.getUserMedia(constraints);
                    video.srcObject = stream;
                    videoTrack = stream.getVideoTracks()[0];

                    // Tunggu video siap
                    await video.play();

                    // Dapatkan info track
                    const settings = videoTrack.getSettings();
                    const deviceLabel = videoTrack.label || 'Webcam';

                    resolutionEl.textContent = `${settings.width || '?'} × ${settings.height || '?'}`;
                    framerateEl.textContent = `${Math.round(settings.frameRate || 30)} FPS`;
                    deviceNameEl.textContent = deviceLabel.length > 20 ? deviceLabel.substring(0, 18) + '...' : deviceLabel;

                    isActive = true;
                    setStatus('active', 'Kamera aktif');

                    console.log('📷 Kamera berhasil diaktifkan:', deviceLabel);
                    console.log('📐 Resolusi:', settings.width, 'x', settings.height);
                    console.log('⚡ Frame rate:', settings.frameRate);

                } catch (error) {
                    console.error('❌ Error mengakses kamera:', error);
                    
                    let errorMsg = 'Gagal mengakses kamera. ';
                    if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                        errorMsg += 'Perizinan kamera ditolak. Silakan izinkan akses kamera di browser.';
                    } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                        errorMsg += 'Tidak ditemukan kamera. Pastikan kamera terhubung.';
                    } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
                        errorMsg += 'Kamera sedang digunakan oleh aplikasi lain.';
                    } else {
                        errorMsg += error.message || 'Terjadi kesalahan tidak dikenal.';
                    }

                    setStatus('inactive', errorMsg);
                    stopCamera();
                }
            }

            // --- Stop Camera ---
            function stopCamera() {
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                    stream = null;
                }
                video.srcObject = null;
                videoTrack = null;
                isActive = false;

                resolutionEl.textContent = '-';
                framerateEl.textContent = '- FPS';
                deviceNameEl.textContent = '-';

                setStatus('inactive', 'Kamera dihentikan');
                console.log('📷 Kamera dihentikan');
            }

            // --- Toggle Camera ---
            function toggleCamera() {
                if (isActive) {
                    stopCamera();
                } else {
                    startCamera();
                }
            }

            // --- Screenshot ---
            function takeScreenshot() {
                if (!isActive || !video.srcObject) {
                    console.warn('⚠️ Kamera tidak aktif untuk screenshot');
                    return;
                }

                const canvas = document.createElement('canvas');
                const videoWidth = video.videoWidth || 1280;
                const videoHeight = video.videoHeight || 720;
                canvas.width = videoWidth;
                canvas.height = videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                // Tambahkan watermark
                ctx.fillStyle = 'rgba(0,0,0,0.5)';
                ctx.fillRect(10, canvas.height - 50, canvas.width - 20, 40);
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.font = '14px Inter, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('📸 Stefanus Setiawan · Fisika Santa Laurensia', 20, canvas.height - 22);

                // Download
                const link = document.createElement('a');
                link.download = `screenshot_fisika_${new Date().toISOString().slice(0,19).replace(/:/g, '-')}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();

                // Feedback
                const btn = screenshotBtn;
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> OK';
                btn.style.borderColor = '#2ecc71';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.borderColor = '';
                }, 1500);

                console.log('📸 Screenshot diambil');
            }

            // --- Event Listeners ---
            toggleBtn.addEventListener('click', toggleCamera);
            screenshotBtn.addEventListener('click', takeScreenshot);

            // Keyboard shortcut: Space untuk toggle, S untuk screenshot
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
                
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    toggleCamera();
                } else if (e.key === 's' || e.key === 'S') {
                    if (isActive) {
                        e.preventDefault();
                        takeScreenshot();
                    }
                }
            });

            // --- Inisialisasi ---
            setStatus('inactive', 'Klik "Mulai" untuk mengaktifkan kamera');

            // Cek dukungan browser
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                setStatus('inactive', 'Browser tidak mendukung kamera');
                toggleBtn.disabled = true;
                console.error('❌ Browser tidak mendukung getUserMedia');
            }

            // --- Status saat tab tidak aktif ---
            document.addEventListener('visibilitychange', () => {
                if (document.hidden && isActive) {
                    console.log('👀 Tab tidak aktif, kamera tetap berjalan');
                }
            });

            console.log('🎥 Webcam Fisika siap digunakan');
