<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PGF 2026 · Perkenalan</title>
  <style>
    /* reset & gaya dasar */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #f7f3e9 0%, #e8e0d5 100%);
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    /* kartu utama – nuansa klasik & hangat */
    .card {
      max-width: 720px;
      width: 100%;
      background: rgba(255, 250, 240, 0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-radius: 2.5rem 2.5rem 2rem 2rem;
      box-shadow: 0 20px 40px -12px rgba(0, 0, 0, 0.25),
                  0 8px 24px -6px rgba(0, 0, 0, 0.08),
                  inset 0 1px 0 rgba(255, 255, 255, 0.6);
      padding: 2.5rem 2.8rem 2.8rem;
      transition: all 0.2s ease;
      border: 1px solid rgba(255, 235, 210, 0.5);
    }

    /* header — tema PGF */
    .header {
      border-bottom: 2px solid #c9b8a4;
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
      position: relative;
    }

    .header::after {
      content: '';
      position: absolute;
      bottom: -4px;
      left: 0;
      width: 80px;
      height: 3px;
      background: #b39b82;
      border-radius: 12px;
    }

    .header h1 {
      font-size: 2.4rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: #3e2e20;
      line-height: 1.2;
    }

    .header .subhead {
      margin-top: 0.4rem;
      font-size: 1.1rem;
      font-weight: 400;
      color: #5f4b36;
      background: rgba(190, 165, 140, 0.15);
      display: inline-block;
      padding: 0.3rem 1.2rem 0.4rem 1.2rem;
      border-radius: 40px;
      backdrop-filter: blur(2px);
      border: 1px solid rgba(190, 165, 140, 0.2);
    }

    .header .subhead i {
      font-style: normal;
      display: inline-block;
      margin: 0 0.2rem;
    }

    .header .subhead .date-place {
      font-weight: 500;
      color: #3d2c1b;
    }

    /* biodata — bersih, tanpa ikon/link */
    .biodata {
      margin: 2.2rem 0 2.8rem 0;
      padding: 0.2rem 0;
    }

    .biodata-item {
      display: flex;
      align-items: baseline;
      padding: 0.65rem 0;
      border-bottom: 1px dashed #dacfc3;
    }

    .biodata-item:last-of-type {
      border-bottom: none;
    }

    .biodata-label {
      font-size: 1rem;
      font-weight: 500;
      color: #6b5a48;
      min-width: 100px;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      font-size: 0.85rem;
      opacity: 0.8;
    }

    .biodata-value {
      font-size: 1.5rem;
      font-weight: 500;
      color: #2c1f13;
      line-height: 1.4;
      word-break: break-word;
    }

    .biodata-value .sekolah {
      font-weight: 400;
      color: #4d3a28;
      background: #ede5db;
      padding: 0.1rem 0.8rem;
      border-radius: 30px;
      font-size: 1.1rem;
      display: inline-block;
      margin-left: 0.3rem;
    }

    /* tombol next – clean, tanpa ikon */
    .next-wrapper {
      display: flex;
      justify-content: flex-end;
      margin-top: 1rem;
      border-top: 1px solid rgba(180, 160, 140, 0.25);
      padding-top: 2rem;
    }

    .btn-next {
      display: inline-block;
      background: #3e2e20;
      color: #fcf6ed;
      font-size: 1.3rem;
      font-weight: 500;
      padding: 0.8rem 2.8rem;
      border-radius: 60px;
      text-decoration: none;
      letter-spacing: 0.02em;
      box-shadow: 0 8px 16px -6px rgba(50, 35, 25, 0.25);
      transition: 0.2s ease;
      border: 1px solid rgba(255, 235, 210, 0.2);
      backdrop-filter: blur(2px);
      background: #3e2e20;
      cursor: pointer;
      text-align: center;
    }

    .btn-next:hover {
      background: #2f2116;
      transform: scale(1.02);
      box-shadow: 0 12px 24px -10px rgba(40, 28, 18, 0.35);
      border-color: #b7a085;
      color: #ffffff;
    }

    .btn-next:active {
      transform: scale(0.97);
      box-shadow: 0 4px 12px -4px rgba(0, 0, 0, 0.3);
    }

    /* fine-tuning untuk mobile */
    @media (max-width: 550px) {
      .card {
        padding: 1.8rem 1.5rem 2rem;
        border-radius: 2rem;
      }
      .header h1 {
        font-size: 2rem;
      }
      .header .subhead {
        font-size: 0.95rem;
        padding: 0.2rem 1rem;
        margin-top: 0.5rem;
      }
      .biodata-item {
        flex-direction: column;
        align-items: flex-start;
        padding: 0.8rem 0;
      }
      .biodata-label {
        min-width: auto;
        font-size: 0.75rem;
        margin-bottom: 0.1rem;
        letter-spacing: 0.06em;
      }
      .biodata-value {
        font-size: 1.3rem;
      }
      .biodata-value .sekolah {
        font-size: 1rem;
        margin-left: 0;
        margin-top: 0.2rem;
      }
      .next-wrapper {
        justify-content: center;
        padding-top: 1.5rem;
      }
      .btn-next {
        width: 100%;
        text-align: center;
        padding: 0.8rem 0;
        font-size: 1.2rem;
      }
    }

    @media (max-width: 400px) {
      .header h1 {
        font-size: 1.6rem;
      }
      .biodata-value {
        font-size: 1.1rem;
      }
    }

    /* sentuhan halus */
    .highlight {
      background: linear-gradient(120deg, #dacfc3 0%, #dacfc3 40%, transparent 80%);
      padding: 0 0.2rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <!-- header : tema PGF 2026, tanggal, tempat -->
    <div class="header">
      <h1>⚛️ PGF 2026</h1>
      <div class="subhead">
        <span class="date-place">22 – 24 Juli 2026</span>
        <span style="margin:0 0.4rem; opacity:0.4;">·</span>
        <span class="date-place">UNPAR</span>
        <span style="margin:0 0.4rem; opacity:0.3;">—</span>
        <span style="font-weight:300; letter-spacing:0.01em;">Pelatihan Guru Fisika</span>
      </div>
    </div>

    <!-- biodata lengkap: Stefanus Setiawan, guru fisika, SMA Santa Laurensia -->
    <div class="biodata">
      <div class="biodata-item">
        <span class="biodata-label">Nama</span>
        <span class="biodata-value">Stefanus Setiawan</span>
      </div>
      <div class="biodata-item">
        <span class="biodata-label">Profesi</span>
        <span class="biodata-value">Guru Fisika</span>
      </div>
      <div class="biodata-item">
        <span class="biodata-label">Sekolah</span>
        <span class="biodata-value">
          SMA Santa Laurensia
          <span class="sekolah">🖋️</span>
        </span>
      </div>
    </div>

    <!-- tombol next menuju halaman simulasi (tanpa embel-embel link lain) -->
    <div class="next-wrapper">
      <a href="https://stefanussetiawan1592-dev.github.io/pgf2026/simulasi" class="btn-next">
        Next →
      </a>
    </div>
  </div>
</body>
</html>
